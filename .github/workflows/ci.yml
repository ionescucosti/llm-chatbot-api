name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.14"
  OPENAI_API_KEY: "test-key-for-ci"
  DATABASE_URL: "sqlite:///./test.db"

jobs:
  test:
    name: Test & Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: uv sync --dev

      - name: Run linter
        run: uv run ruff check .

      - name: Check formatting
        run: uv run ruff format --check .

      - name: Run tests
        run: uv run pytest --tb=short

  docker:
    name: Build & Smoke Test
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t llm-chatbot-api:ci .

      - name: Start services
        env:
          OPENAI_API_KEY: test-key-for-ci
        run: |
          docker compose up -d
          sleep 5

      - name: Wait for services to be healthy
        run: |
          echo "Waiting for database..."
          for i in {1..30}; do
            docker compose exec -T db pg_isready -U chatbot -d chatbot && break
            sleep 1
          done
          echo "Waiting for API..."
          for i in {1..30}; do
            curl -s http://localhost:8000/health && break
            sleep 1
          done

      - name: Smoke test - health check
        run: |
          response=$(curl -s http://localhost:8000/health)
          echo "Response: $response"
          echo "$response" | grep -q "status" || exit 1
          echo "✓ Health check passed"

      - name: Smoke test - root endpoint
        run: |
          response=$(curl -s http://localhost:8000/)
          echo "Response: $response"
          echo "$response" | grep -q "Hello" || exit 1
          echo "✓ Root endpoint passed"

      - name: Show logs on failure
        if: failure()
        run: |
          echo "=== API Logs ==="
          docker compose logs api
          echo "=== DB Logs ==="
          docker compose logs db

      - name: Cleanup
        if: always()
        run: docker compose down -v

