name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.14"
  OPENAI_API_KEY: "test-key-for-ci"
  DATABASE_URL: "sqlite:///./test.db"

jobs:
  test:
    name: Test & Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: uv sync --dev

      - name: Run linter
        run: uv run ruff check .

      - name: Check formatting
        run: uv run ruff format --check .

      - name: Run tests
        run: uv run pytest --tb=short

  docker:
    name: Build & Smoke Test
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t llm-chatbot-api:ci .

      - name: Start database
        run: |
          docker compose up -d db
          sleep 5

      - name: Wait for database
        run: |
          for i in {1..30}; do
            docker compose exec -T db pg_isready -U chatbot -d chatbot && break
            echo "Waiting for database..."
            sleep 1
          done

      - name: Run API container
        run: |
          docker run -d \
            --name chatbot-api-test \
            --network llm-chatbot-api_default \
            -p 8000:8000 \
            -e OPENAI_API_KEY=test-key \
            -e DATABASE_URL=postgresql+psycopg://chatbot:chatbot@db:5432/chatbot \
            llm-chatbot-api:ci
          sleep 3

      - name: Smoke test - health check
        run: |
          curl -f http://localhost:8000/health || exit 1
          echo "✓ Health check passed"

      - name: Smoke test - root endpoint
        run: |
          curl -f http://localhost:8000/ || exit 1
          echo "✓ Root endpoint passed"

      - name: Show logs on failure
        if: failure()
        run: |
          echo "=== API Logs ==="
          docker logs chatbot-api-test
          echo "=== DB Logs ==="
          docker compose logs db

      - name: Cleanup
        if: always()
        run: |
          docker stop chatbot-api-test || true
          docker rm chatbot-api-test || true
          docker compose down -v || true

